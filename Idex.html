<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#141e2b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Дом Уровень • Чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .app-container {
            max-width: 480px;
            width: 100%;
            height: 100vh;
            max-height: 900px;
            background: #f0f3f8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }

        /* Регистрация */
        .register-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0e14 0%, #1a2230 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 30px;
            gap: 20px;
            animation: fadeIn 0.5s ease;
        }
        .register-overlay.hidden { display: none; }

        .register-logo {
            font-size: 64px;
            background: #e6b84c;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(230, 184, 76, 0.3);
            margin-bottom: 10px;
        }
        .register-title {
            color: white;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .register-sub {
            color: #8a9bb5;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .register-input {
            width: 100%;
            max-width: 320px;
            padding: 18px 24px;
            border: 2px solid #e6b84c;
            border-radius: 30px;
            font-size: 18px;
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }
        .register-input:focus {
            border-color: #f5c85e;
            box-shadow: 0 0 0 4px rgba(230, 184, 76, 0.2);
            background: rgba(255,255,255,0.1);
        }
        .register-input::placeholder {
            color: #5a6a82;
        }
        .register-btn {
            width: 100%;
            max-width: 320px;
            padding: 18px;
            background: linear-gradient(135deg, #e6b84c, #d4a83a);
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            color: #0a0e14;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 30px rgba(230, 184, 76, 0.3);
        }
        .register-btn:active { transform: scale(0.96); }
        .register-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(230, 184, 76, 0.4); }
        .register-error {
            color: #ff6b6b;
            font-size: 14px;
            display: none;
        }
        .register-error.visible { display: block; }
        .register-hint {
            color: #5a6a82;
            font-size: 13px;
            margin-top: 10px;
        }

        /* Шапка */
        .chat-header {
            background: #0a0e14;
            padding: 12px 16px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid #e6b84c;
            flex-shrink: 0;
            padding-top: 44px;
        }
        .header-icon {
            background: #e6b84c;
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .header-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            flex: 1;
        }
        .header-title {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.3px;
        }
        .header-sub {
            font-size: 11px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-user {
            font-size: 12px;
            color: #e6b84c;
            font-weight: 600;
            background: rgba(255,255,255,0.08);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(230, 184, 76, 0.2);
            white-space: nowrap;
        }
        .header-online {
            font-size: 10px;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header-online::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Сообщения */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 4px 12px;
            background: #eef1f6;
            display: flex;
            flex-direction: column;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeInUp 0.25s ease;
            position: relative;
        }
        .message-in {
            align-self: flex-start;
            background: #ffffff;
            border-bottom-left-radius: 4px;
            border: 1px solid #e8edf4;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .message-out {
            align-self: flex-end;
            background: #0a0e14;
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .message-out .msg-time { color: #8a9bb5; }
        .message-out .msg-author { color: #e6b84c; }
        .msg-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .msg-author {
            font-weight: 600;
            font-size: 12px;
            color: #e6b84c;
        }
        .message-in .msg-author { color: #0a0e14; }
        .msg-time {
            font-size: 10px;
            opacity: 0.6;
            color: #6a7a92;
        }
        .msg-text {
            margin-bottom: 2px;
            word-break: break-word;
        }
        .msg-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-bottom: 4px;
            display: block;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
        }
        .msg-image:active { transform: scale(0.98); }
        .msg-audio {
            width: 180px;
            height: 36px;
            border-radius: 20px;
            margin-bottom: 2px;
        }
        .msg-reply {
            font-size: 12px;
            opacity: 0.7;
            padding: 4px 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            margin-bottom: 4px;
            border-left: 3px solid #e6b84c;
        }
        .message-out .msg-reply {
            background: rgba(255,255,255,0.08);
        }
        .msg-actions {
            display: none;
            gap: 4px;
            margin-left: auto;
        }
        .message:hover .msg-actions,
        .message:active .msg-actions {
            display: flex;
        }
        .msg-action-btn {
            background: none;
            border: none;
            color: inherit;
            opacity: 0.5;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
        }
        .msg-action-btn:active { opacity: 1; }

        .system-message {
            align-self: center;
            background: rgba(10, 14, 20, 0.06);
            color: #3a4a5e;
            font-size: 12px;
            padding: 5px 16px;
            border-radius: 30px;
            max-width: 92%;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.04);
            font-weight: 500;
        }
        .system-message strong { color: #e6b84c; }

        /* Ввод */
        .chat-footer {
            background: #ffffff;
            padding: 8px 12px 12px 12px;
            border-top: 1px solid #e8edf4;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .footer-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dce3ed;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background: #f8faff;
            transition: 0.2s;
            min-width: 80px;
            -webkit-appearance: none;
        }
        .footer-input:focus {
            border-color: #e6b84c;
            background: white;
            box-shadow: 0 0 0 3px rgba(230, 184, 76, 0.12);
        }
        .btn {
            background: #0a0e14;
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #2a3a4a;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:active { transform: scale(0.94); }
        .btn-primary {
            background: linear-gradient(135deg, #e6b84c, #d4a83a);
            color: #0a0e14;
            border-color: #e6b84c;
        }
        .btn-icon {
            background: rgba(10, 14, 20, 0.06);
            color: #0a0e14;
            border-color: #dce3ed;
            padding: 10px 12px;
            font-size: 16px;
        }
        .btn-icon:active { background: rgba(0,0,0,0.1); }
        .btn-record {
            background: #dc3545;
            border-color: #dc3545;
            padding: 10px 12px;
            font-size: 16px;
            animation: pulse 1.5s infinite;
        }
        .btn-record.recording {
            background: #ff6b6b;
            animation: pulse 0.6s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: #e8edf4; border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #e6b84c; border-radius: 10px; }

        .hidden-input { display: none; }

        /* Панель инструментов */
        .toolbar {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            padding: 4px 12px;
            background: #f8faff;
            border-top: 1px solid #e8edf4;
            flex-shrink: 0;
        }
        .toolbar-btn {
            background: none;
            border: none;
            padding: 6px 10px;
            font-size: 13px;
            cursor: pointer;
            color: #4a5a6e;
            border-radius: 8px;
            transition: 0.2s;
        }
        .toolbar-btn:active { background: rgba(0,0,0,0.06); }
        .toolbar-btn:hover { background: rgba(0,0,0,0.04); }

        /* Эмодзи пикер */
        .emoji-picker {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px;
            background: white;
            border-top: 1px solid #e8edf4;
            flex-shrink: 0;
            max-height: 150px;
            overflow-y: auto;
        }
        .emoji-picker.show { display: flex; }
        .emoji-picker span {
            font-size: 24px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            transition: 0.15s;
        }
        .emoji-picker span:active { background: #e8edf4; transform: scale(1.2); }

        /* Статус печатает */
        .typing-status {
            font-size: 12px;
            color: #6a7a92;
            padding: 2px 12px;
            display: none;
            font-style: italic;
        }

        @media (max-width: 480px) {
            .app-container { max-height: 100vh; border-radius: 0; }
            .btn { padding: 8px 10px; font-size: 12px; }
            .header-title { font-size: 16px; }
            .register-title { font-size: 24px; }
        }
        @media (min-width: 481px) {
            body { padding: 20px; }
            .app-container {
                border-radius: 28px;
                box-shadow: 0 20px 60px rgba(0,0,0,0.4);
                height: 90vh;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Регистрация -->
    <div class="register-overlay" id="registerOverlay">
        <div class="register-logo">🏠</div>
        <div class="register-title">Дом Уровень</div>
        <div class="register-sub">Войдите в чат жильцов</div>
        <input type="text" class="register-input" id="registerInput" placeholder="Ваше имя" maxlength="20" autofocus>

        <button class="register-btn" id="registerBtn">Войти в чат</button>

    <!-- Шапка -->
    <div class="chat-header">

    <!-- Сообщения -->

    <!-- Статус печатает -->

    <!-- Панель инструментов -->

        <button class="toolbar-btn" onclick="clearChat()">🗑 Очистить</button>
        <button class="toolbar-btn" onclick="exportChat()">📤 Экспорт</button>
        <button class="toolbar-btn" onclick="toggleTheme()">🌙 Тема</button>
    </div>

    <!-- Эмодзи пикер -->
    <div class="emoji-picker" id="emojiPicker">
        <span onclick="addEmoji('😊')">😊</span>

    <div class="chat-footer">
        <input type="text" class="footer-input" id="messageInput" placeholder="Написать сообщение..." />

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        getDatabase, ref, push, onChildAdded, query, limitToLast, 
        set, onValue, remove, update, get, child 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { 
        getStorage, ref as storageRef, uploadBytes, getDownloadURL 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBGQsFeeyYbNMjT_pvLSrukC_In2mwzoY4",
        authDomain: "chaturoven.firebaseapp.com",
        projectId: "chaturoven",
        storageBucket: "chaturoven.firebasestorage.app",
        messagingSenderId: "756824112892",
        appId: "1:756824112892:web:094cbe71a4d420fa502179"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const messagesRef = ref(db, 'messages');
    const usersRef = ref(db, 'users');
    const typingRef = ref(db, 'typing');

    // DOM
    const registerOverlay = document.getElementById('registerOverlay');
    const registerInput = document.getElementById('registerInput');
    const registerBtn = document.getElementById('registerBtn');
    const registerError = document.getElementById('registerError');
    const currentUserDisplay = document.getElementById('currentUser');
    const messagesContainer = document.getElementById('chatMessages');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const photoBtn = document.getElementById('photoBtn');
    const fileInput = document.getElementById('fileInput');
    const audioBtn = document.getElementById('audioBtn');
    const onlineCount = document.getElementById('onlineCount');
    const typingStatus = document.getElementById('typingStatus');
    const emojiPicker = document.getElementById('emojiPicker');
    const replyBtn = document.getElementById('replyBtn');

    let currentUserName = '';
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let lastMessageId = null;
    let replyToMessage = null;
    let isDarkTheme = false;

    // ===== ФУНКЦИИ =====

    function loadSavedUser() {
        const saved = localStorage.getItem('chat_username');
        if (saved && saved.trim()) return saved.trim();
        return null;
    }

    function loginUser(name) {
        currentUserName = name;
        localStorage.setItem('chat_username', name);
        localStorage.setItem('chat_user_id', Date.now().toString());
        currentUserDisplay.textContent = name;
        registerOverlay.classList.add('hidden');
        input.focus();
        addSystemMessage(name + ' вошёл в чат');
        updateOnlineStatus(true);
        loadMessages();
        updateOnlineCount();
        watchTyping();
    }

    function updateOnlineStatus(online) {
        const userId = localStorage.getItem('chat_user_id') || 'guest';
        set(ref(db, 'users/' + userId), {
            name: currentUserName || 'Гость',
            online: online,
            lastSeen: Date.now()
        });
    }

    function updateOnlineCount() {
        onValue(usersRef, (snapshot) => {
            let count = 0;
            snapshot.forEach((child) => {
                const data = child.val();
                if (data.online && (Date.now() - data.lastSeen < 60000)) {
                    count++;
                }
            });
            onlineCount.textContent = count + ' онлайн';
        });
    }

    function watchTyping() {
        onValue(typingRef, (snapshot) => {
            let typingUsers = [];
            snapshot.forEach((child) => {
                const data = child.val();
                if (data.typing && (Date.now() - data.timestamp < 3000) && data.name !== currentUserName) {
                    typingUsers.push(data.name);
                }
            });
            if (typingUsers.length > 0) {
                typingStatus.textContent = typingUsers.join(', ') + ' печатает...';
                typingStatus.style.display = 'block';
            } else {
                typingStatus.style.display = 'none';
            }
        });
    }

    function setTypingStatus(typing) {
        const userId = localStorage.getItem('chat_user_id') || 'guest';
        set(ref(db, 'typing/' + userId), {
            name: currentUserName || 'Гость',
            typing: typing,
            timestamp: Date.now()
        });
    }

    function loadMessages() {
        const recentQuery = query(messagesRef, limitToLast(100));
        onChildAdded(recentQuery, (snapshot) => {
            const data = snapshot.val();
            if (data.id !== lastMessageId) {
                addMessageToDOM(data);
                lastMessageId = data.id;
                scrollToBottom();
                playNotificationSound();
            }
        });
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text && !replyToMessage) return;

        const userId = localStorage.getItem('chat_user_id') || 'guest';
        const messageData = {
            id: Date.now().toString(),
            author: currentUserName || 'Гость',
            text: text || '[вложение]',
            timestamp: Date.now(),
            userId: userId,
            replyTo: replyToMessage || null
        };

        push(messagesRef, messageData);
        input.value = '';
        replyToMessage = null;
        replyBtn.style.display = 'none';
        setTypingStatus(false);
        input.focus();
    }

    function addMessageToDOM(data) {
        const msgDiv = document.createElement('div');
        const isOutgoing = data.userId === localStorage.getItem('chat_user_id');
        msgDiv.className = `message ${isOutgoing ? 'message-out' : 'message-in'}`;
        msgDiv.dataset.id = data.id;

        const time = new Date(data.timestamp);
        const timeStr = time.getHours().toString().padStart(2, '0') + ':' + 
                        time.getMinutes().toString().padStart(2, '0');

        let content = '';
        if (data.image) {
            content = `<img src="${data.image}" class="msg-image" alt="фото" onclick="window.open('${data.image}','_blank')" />`;
        } else if (data.audio) {
            content = `<audio controls class="msg-audio" src="${data.audio}"></audio>`;
        } else {
            content = `<div class="msg-text">${escapeHtml(data.text)}</div>`;
        }

        let replyHtml = '';
        if (data.replyTo) {
            replyHtml = `<div class="msg-reply">↳ ${escapeHtml(data.replyTo)}</div>`;
        }

        msgDiv.innerHTML = `
            ${replyHtml}
            ${content}
            <div class="msg-meta">
                <span class="msg-author">${escapeHtml(data.author)}</span>
                <span class="msg-time">${timeStr}</span>
                <span class="msg-actions">
                    <button class="msg-action-btn" onclick="replyToMessage('${data.id}')">↩</button>
                    <button class="msg-action-btn" onclick="pinMessage('${data.id}')">📌</button>
                    <button class="msg-action-btn" onclick="deleteMessage('${data.id}')">🗑</button>
                </span>
            </div>
        `;

        messagesContainer.appendChild(msgDiv);
        scrollToBottom();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function scrollToBottom() {
        setTimeout(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 100);
    }

    function addSystemMessage(text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'system-message';
        msgDiv.innerHTML = '<strong>УРОВЕНЬ</strong> — ' + text;
        messagesContainer.appendChild(msgDiv);
        scrollToBottom();
    }

    // Фото
    async function sendImage(file) {
        const userId = localStorage.getItem('chat_user_id') || 'guest';
        const storagePath = storageRef(storage, 'images/' + Date.now() + '_' + file.name);
        try {
            const snapshot = await uploadBytes(storagePath, file);
            const url = await getDownloadURL(snapshot.ref);
            const messageData = {
                id: Date.now().toString(),
                author: currentUserName || 'Гость',
                image: url,
                timestamp: Date.now(),
                userId: userId
            };
            push(messagesRef, messageData);
        } catch (error) {
            alert('Не удалось загрузить фото');
        }
    }

    // Аудио
    async function sendAudio(blob) {
        const userId = localStorage.getItem('chat_user_id') || 'guest';
        const storagePath = storageRef(storage, 'audio/' + Date.now() + '.wav');
        try {
            const snapshot = await uploadBytes(storagePath, blob);
            const url = await getDownloadURL(snapshot.ref);
            const messageData = {
                id: Date.now().toString(),
                author: currentUserName || 'Гость',
                audio: url,
                timestamp: Date.now(),
                userId: userId
            };
            push(messagesRef, messageData);
        } catch (error) {
            alert('Не удалось загрузить аудио');
        }
    }

    // Запись
    function toggleRecording() {
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    }

    function startRecording() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            alert('Ваш браузер не поддерживает запись аудио');
            return;
        }
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    sendAudio(audioBlob);
                    audioBtn.classList.remove('recording');
                    audioBtn.textContent = '🎤';
                    isRecording = false;
                };
                mediaRecorder.start();
                isRecording = true;
                audioBtn.classList.add('recording');
                audioBtn.textContent = '⏹';
            })
            .catch(() => alert('Нет доступа к микрофону'));
    }

    function stopRecording() {
        if (mediaRecorder && isRecording) {
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
        }
    }

    // Ответ
    window.replyToMessage = function(id) {
        const messages = messagesContainer.querySelectorAll('.message');
        for (const msg of messages) {
            if (msg.dataset.id === id) {
                const text = msg.querySelector('.msg-text');
                if (text) {
                    replyToMessage = text.textContent;
                    replyBtn.style.display = 'inline-flex';
                    replyBtn.textContent = '↩ ' + replyToMessage.slice(0, 25) + '...';
                    break;
                }
            }
        }
    };

    // Закрепление
    window.pinMessage = function(id) {
        const messages = messagesContainer.querySelectorAll('.message');
        for (const msg of messages) {
            if (msg.dataset.id === id) {
                msg.style.border = '2px solid #e6b84c';
                msg.style.boxShadow = '0 0 20px rgba(230, 184, 76, 0.25)';
                addSystemMessage('Сообщение закреплено');
                break;
            }
        }
    };

    // Удаление
    window.deleteMessage = function(id) {
        if (confirm('Удалить сообщение?')) {
            const msgRef = ref(db, 'messages/' + id);
            remove(msgRef);
            const messages = messagesContainer.querySelectorAll('.message');
            for (const msg of messages) {
                if (msg.dataset.id === id) {
                    msg.remove();
                    break;
                }
            }
            addSystemMessage('Сообщение удалено');
        }
    };

    // Эмодзи
    function toggleEmojiPicker() {
        emojiPicker.classList.toggle('show');
    }

    window.addEmoji = function(emoji) {
        input.value += emoji;
        input.focus();
        emojiPicker.classList.remove('show');
    };

    // Опрос
    window.createPoll = function() {
        const question = prompt('Вопрос для голосования:');
        if (!question) return;
        const options = prompt('Варианты через запятую:');
        if (!options) return;
        const opts = options.split(',').map(o => o.trim());
        let html = `<div style="background:white;padding:12px;border-radius:12px;border:1px solid #e8edf4;"><p><strong>📊 ${question}</strong></p>`;
        opts.forEach((opt, i) => {
            html += `<button onclick="votePoll(${i})" style="margin:4px;padding:8px 16px;border:1px solid #e6b84c;border-radius:20px;background:none;cursor:pointer;">${opt}</button> `;
        });
        html += `</div>`;
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message message-in';
        msgDiv.innerHTML = html;
        messagesContainer.appendChild(msgDiv);
        scrollToBottom();
    };

    window.votePoll = function(index) {
        addSystemMessage('Голос принят');
    };

    // Геолокация
    window.sendLocation = function() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const url = `https://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                const userId = localStorage.getItem('chat_user_id') || 'guest';
                push(messagesRef, {
                    id: Date.now().toString(),
                    author: currentUserName || 'Гость',
                    text: '📍 Моё местоположение: ' + url,
                    timestamp: Date.now(),
                    userId: userId
                });
            }, () => alert('Не удалось определить геолокацию'));
        } else {
            alert('Геолокация не поддерживается');
        }
    };

    // Контакт
    window.sendContact = function() {
        const name = prompt('Имя контакта:');
        const phone = prompt('Телефон:');
        if (name && phone) {
            const userId = localStorage.getItem('chat_user_id') || 'guest';
            push(messagesRef, {
                id: Date.now().toString(),
                author: currentUserName || 'Гость',
                text: `📇 Контакт: ${name}, тел: ${phone}`,
                timestamp: Date.now(),
                userId: userId
            });
        }
    };

    // Очистка
    window.clearChat = function() {
        if (confirm('Очистить весь чат?')) {
            set(messagesRef, null);
            messagesContainer.innerHTML = '';
            addSystemMessage('Чат очищен');
        }
    };

    // Экспорт
    window.exportChat = function() {
        const messages = messagesContainer.querySelectorAll('.message');
        let text = 'Чат Дом Уровень\n' + '='.repeat(50) + '\n\n';
        messages.forEach(msg => {
            const author = msg.querySelector('.msg-author');
            const time = msg.querySelector('.msg-time');
            const content = msg.querySelector('.msg-text');
            if (author && time && content) {
                text += `${author.textContent} (${time.textContent}): ${content.textContent}\n`;
            }
        });
        const blob = new Blob([text], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'chat_export.txt';
        a.click();
        URL.revokeObjectURL(url);
        addSystemMessage('Чат экспортирован');
    };

    // Тема
    window.toggleTheme = function() {
        isDarkTheme = !isDarkTheme;
        if (isDarkTheme) {
            document.body.style.background = '#0a0e14';
            document.querySelector('.app-container').style.background = '#1a1f2b';
            document.querySelector('.chat-messages').style.background = '#151a24';
            document.querySelectorAll('.message-in').forEach(el => {
                el.style.background = '#2a3245';
                el.style.color = 'white';
                el.style.borderColor = '#3c4b5e';
            });
            document.querySelector('.chat-footer').style.background = '#0a0e14';
            document.querySelector('.footer-input').style.background = '#1a1f2b';
            document.querySelector('.footer-input').style.color = 'white';
            document.querySelector('.footer-input').style.borderColor = '#3c4b5e';
            document.querySelector('.toolbar').style.background = '#0a0e14';
            document.querySelectorAll('.toolbar-btn').forEach(el => el.style.color = '#8a9bb5');
            document.querySelector('.typing-status').style.color = '#8a9bb5';
            document.getElementById('themeBtn').textContent = '☀️';
        } else {
            document.body.style.background = '#0a0e14';
            document.querySelector('.app-container').style.background = '#f0f3f8';
            document.querySelector('.chat-messages').style.background = '#eef1f6';
            document.querySelectorAll('.message-in').forEach(el => {
                el.style.background = '#ffffff';
                el.style.color = '#0a0e14';
                el.style.borderColor = '#e8edf4';
            });
            document.querySelector('.chat-footer').style.background = '#ffffff';
            document.querySelector('.footer-input').style.background = '#f8faff';
            document.querySelector('.footer-input').style.color = '#0a0e14';
            document.querySelector('.footer-input').style.borderColor = '#dce3ed';
            document.querySelector('.toolbar').style.background = '#f8faff';
            document.querySelectorAll('.toolbar-btn').forEach(el => el.style.color = '#4a5a6e');
            document.querySelector('.typing-status').style.color = '#6a7a92';
            document.getElementById('themeBtn').textContent = '🌙';
        }
    };

    // Звук уведомления
    function playNotificationSound() {
        try {
            const audio = new Audio('data:audio/wav;base64,UklGRnoAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoAAACBhYqFhYR8g4eMk4iIf4ODg4OFhoeIiIaHhoeIiIaHhoeIiIaHhoeIiIaHhoeIiIaHhoeIiIaHhoeIiIaHhoeIiIaHhoeIiIaHhoeIiIaHhoeIiIaHhoaHiIiG');
            audio.play().catch(() => {});
        } catch(e) {}
    }

    // ===== СОБЫТИЯ =====

    registerBtn.addEventListener('click', () => {
        const name = registerInput.value.trim();
        if (!name) {
            registerError.classList.add('visible');
            return;
        }
        registerError.classList.remove('visible');
        loginUser(name);
    });

    registerInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            registerBtn.click();
        }
    });

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
        setTypingStatus(true);
        clearTimeout(input._typingTimeout);
        input._typingTimeout = setTimeout(() => setTypingStatus(false), 2000);
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            sendImage(e.target.files[0]);
            fileInput.value = '';
        }
    });

    audioBtn.addEventListener('click', toggleRecording);

    replyBtn.addEventListener('click', () => {
        replyToMessage = null;
        replyBtn.style.display = 'none';
    });

    // Загрузка
    const savedName = loadSavedUser();
    if (savedName) {
        loginUser(savedName);
    } else {
        registerOverlay.classList.remove('hidden');
        registerInput.focus();
    }

    // Напоминание при уходе
    window.addEventListener('beforeunload', () => {
        updateOnlineStatus(false);
    });
</script>

</body>
</html>
