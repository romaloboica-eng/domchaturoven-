<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <title>Роблоксия • Городской чат</title>
    <style>
        /* ===== ОБНУЛЕНИЕ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== ТЕЛО ===== */
        body {
            background: #0a0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        /* ===== КОНТЕЙНЕР ===== */
        .app-container {
            max-width: 480px;
            width: 100%;
            height: 100vh;
            max-height: 900px;
            background: #f0f3f8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: 0.3s;
        }

        /* ===== РЕГИСТРАЦИЯ ===== */
        .register-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0e14 0%, #1a1028 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 30px;
            gap: 16px;
            animation: fadeIn 0.5s ease;
        }
        .register-overlay.hidden {
            display: none;
        }

        .register-logo {
            font-size: 64px;
            background: linear-gradient(135deg, #e74c8b, #8e44ad);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 60px rgba(231, 76, 139, 0.3);
            margin-bottom: 10px;
        }
        .register-title {
            color: white;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .register-title span {
            background: linear-gradient(135deg, #e74c8b, #8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .register-sub {
            color: #8a9bb5;
            font-size: 16px;
            text-align: center;
        }
        .register-input {
            width: 100%;
            max-width: 320px;
            padding: 18px 24px;
            border: 2px solid #e74c8b;
            border-radius: 30px;
            font-size: 18px;
            background: rgba(255,255,255,0.05);
            color: white;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }
        .register-input:focus {
            border-color: #8e44ad;
            box-shadow: 0 0 0 4px rgba(231, 76, 139, 0.2);
            background: rgba(255,255,255,0.1);
        }
        .register-input::placeholder {
            color: #5a6a82;
        }
        .register-btn {
            width: 100%;
            max-width: 320px;
            padding: 18px;
            background: linear-gradient(135deg, #e74c8b, #8e44ad);
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 30px rgba(231, 76, 139, 0.3);
        }
        .register-btn:active {
            transform: scale(0.96);
        }
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(231, 76, 139, 0.4);
        }
        .register-error {
            color: #ff6b6b;
            font-size: 14px;
            display: none;
        }
        .register-error.visible {
            display: block;
        }

        /* ===== ШАПКА ===== */
        .chat-header {
            background: #0a0e14;
            padding: 10px 14px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid #e74c8b;
            flex-shrink: 0;
            padding-top: 44px;
        }
        .header-icon {
            background: linear-gradient(135deg, #e74c8b, #8e44ad);
            width: 40px;
            height: 40px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .header-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            flex: 1;
        }
        .header-title {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: -0.3px;
        }
        .header-title span {
            background: linear-gradient(135deg, #e74c8b, #8e44ad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-sub {
            font-size: 11px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-user {
            font-size: 12px;
            color: #e74c8b;
            font-weight: 600;
            background: rgba(255,255,255,0.08);
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid rgba(231, 76, 139, 0.2);
            white-space: nowrap;
        }

        /* ===== ГОРОДСКОЙ СТАТУС ===== */
        .city-status {
            padding: 6px 12px;
            background: #141c28;
            color: #8a9bb5;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 1px solid #2a3a4a;
        }
        .city-status .online-count {
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .city-status .online-count::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ===== НАВИГАЦИЯ ПО КАНАЛАМ ===== */
        .channel-nav {
            background: #141c28;
            padding: 8px 12px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            flex-shrink: 0;
            border-bottom: 1px solid #2a3a4a;
            -webkit-overflow-scrolling: touch;
        }
        .channel-nav::-webkit-scrollbar {
            display: none;
        }
        .channel-btn {
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #2a3a4a;
            background: transparent;
            color: #8a9bb5;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .channel-btn.active {
            background: linear-gradient(135deg, #e74c8b, #8e44ad);
            color: white;
            border-color: #e74c8b;
        }
        .channel-btn:active {
            transform: scale(0.95);
        }

        /* ===== СООБЩЕНИЯ ===== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px 4px 12px;
            background: #eef1f6;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: #e8edf4;
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #e74c8b;
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 88%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeInUp 0.2s ease;
            position: relative;
        }
        .message-in {
            align-self: flex-start;
            background: #ffffff;
            border-bottom-left-radius: 4px;
            border: 1px solid #e8edf4;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .message-out {
            align-self: flex-end;
            background: #0a0e14;
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .message-out .msg-time {
            color: #8a9bb5;
        }
        .message-out .msg-author {
            color: #e74c8b;
        }

        .msg-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
            gap: 8px;
            flex-wrap: wrap;
        }
        .msg-author {
            font-weight: 600;
            font-size: 12px;
            color: #e74c8b;
        }
        .message-in .msg-author {
            color: #0a0e14;
        }
        .msg-time {
            font-size: 10px;
            opacity: 0.6;
            color: #6a7a92;
        }
        .msg-text {
            margin-bottom: 2px;
            word-break: break-word;
        }
        .msg-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-bottom: 4px;
            display: block;
            object-fit: cover;
            cursor: pointer;
            transition: 0.2s;
        }
        .msg-image:active {
            transform: scale(0.98);
        }
        .msg-audio {
            width: 180px;
            height: 36px;
            border-radius: 20px;
            margin-bottom: 2px;
        }
        .msg-reply {
            font-size: 12px;
            opacity: 0.7;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 8px;
            margin-bottom: 4px;
            border-left: 3px solid #e74c8b;
        }
        .message-out .msg-reply {
            background: rgba(255, 255, 255, 0.08);
        }

        .msg-actions {
            display: none;
            gap: 4px;
            margin-left: auto;
        }
        .message:hover .msg-actions,
        .message:active .msg-actions {
            display: flex;
        }
        .msg-action-btn {
            background: none;
            border: none;
            color: inherit;
            opacity: 0.5;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
        }
        .msg-action-btn:active {
            opacity: 1;
        }

        /* ===== СИСТЕМНЫЕ СООБЩЕНИЯ ===== */
        .system-message {
            align-self: center;
            background: rgba(10, 14, 20, 0.06);
            color: #3a4a5e;
            font-size: 12px;
            padding: 5px 16px;
            border-radius: 30px;
            max-width: 92%;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.04);
            font-weight: 500;
        }
        .system-message strong {
            color: #e74c8b;
        }
        .system-message .city-tag {
            background: linear-gradient(135deg, #e74c8b, #8e44ad);
            color: white;
            padding: 1px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
        }

        /* ===== СТАТУС ПЕЧАТАЕТ ===== */
        .typing-status {
            font-size: 12px;
            color: #6a7a92;
            padding: 2px 12px;
            display: none;
            font-style: italic;
            background: #f8faff;
        }

        /* ===== ПАНЕЛЬ ИНСТРУМЕНТОВ ===== */
        .toolbar {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            padding: 4px 12px;
            background: #f8faff;
            border-top: 1px solid #e8edf4;
            flex-shrink: 0;
        }
        .toolbar-btn {
            background: none;
            border: none;
            padding: 6px 10px;
            font-size: 13px;
            cursor: pointer;
            color: #4a5a6e;
            border-radius: 8px;
            transition: 0.2s;
        }
        .toolbar-btn:active {
            background: rgba(0, 0, 0, 0.06);
        }

        /* ===== ЭМОДЗИ ПИКЕР ===== */
        .emoji-picker {
            display: none;
            flex-wrap: wrap;
            gap: 4px;
            padding: 8px;
            background: white;
            border-top: 1px solid #e8edf4;
            flex-shrink: 0;
            max-height: 150px;
            overflow-y: auto;
        }
        .emoji-picker.show {
            display: flex;
        }
        .emoji-picker span {
            font-size: 24px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            transition: 0.15s;
        }
        .emoji-picker span:active {
            background: #e8edf4;
            transform: scale(1.2);
        }

        /* ===== ФУТЕР ===== */
        .chat-footer {
            background: #ffffff;
            padding: 8px 12px 12px 12px;
            border-top: 1px solid #e8edf4;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .footer-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #dce3ed;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            background: #f8faff;
            transition: 0.2s;
            min-width: 80px;
        }
        .footer-input:focus {
            border-color: #e74c8b;
            background: white;
            box-shadow: 0 0 0 3px rgba(231, 76, 139, 0.12);
        }

        /* ===== КНОПКИ ===== */
        .btn {
            background: #0a0e14;
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #2a3a4a;
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:active {
            transform: scale(0.94);
        }
        .btn-primary {
            background: linear-gradient(135deg, #e74c8b, #8e44ad);
            color: white;
            border-color: #e74c8b;
        }
        .btn-icon {
            background: rgba(10, 14, 20, 0.06);
            color: #0a0e14;
            border-color: #dce3ed;
            padding: 10px 12px;
            font-size: 16px;
        }
        .btn-record {
            background: #dc3545;
            border-color: #dc3545;
            padding: 10px 12px;
            font-size: 16px;
            animation: pulse 1.5s infinite;
        }
        .btn-record.recording {
            background: #ff6b6b;
            animation: pulse 0.6s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .hidden-input {
            display: none;
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 480px) {
            .app-container {
                max-height: 100vh;
                border-radius: 0;
            }
            .btn {
                padding: 8px 10px;
                font-size: 12px;
            }
            .header-title {
                font-size: 16px;
            }
            .register-title {
                font-size: 24px;
            }
        }
        @media (min-width: 481px) {
            body {
                padding: 20px;
            }
            .app-container {
                border-radius: 28px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
                height: 90vh;
            }
        }
    </style>
</head>
<body>

    <!-- ===== КОНТЕЙНЕР ===== -->
    <div class="app-container">

        <!-- ===== РЕГИСТРАЦИЯ ===== -->
        <div class="register-overlay" id="registerOverlay">
            <div class="register-logo">🏙️</div>
            <div class="register-title">Город <span>Роблоксия</span></div>
            <div class="register-sub">Войдите в городской чат</div>
            <input type="text" class="register-input" id="registerInput" placeholder="Ваше имя" maxlength="20" autofocus>
            <div class="register-error" id="registerError">Имя не может быть пустым</div>
            <button class="register-btn" id="registerBtn">Войти в город</button>
        </div>

        <!-- ===== ШАПКА ===== -->
        <div class="chat-header">
            <div class="header-icon">🏙️</div>
            <div class="header-text">
                <div class="header-title">Город <span>Роблоксия</span></div>
                <div class="header-sub">
                    <span id="currentChannel">🏠 Общий</span>
                </div>
            </div>
            <div class="header-user" id="currentUser">Гость</div>
        </div>

        <!-- ===== ГОРОДСКОЙ СТАТУС ===== -->
        <div class="city-status">
            <span id="cityStatus">🌆 Роблоксия живёт</span>
            <span class="online-count" id="onlineCount">0 онлайн</span>
        </div>

        <!-- ===== НАВИГАЦИЯ ПО КАНАЛАМ ===== -->
        <div class="channel-nav" id="channelNav">
            <button class="channel-btn active" data-channel="general">🏠 Общий</button>
            <button class="channel-btn" data-channel="news">📰 Новости</button>
            <button class="channel-btn" data-channel="services">🔧 Услуги</button>
            <button class="channel-btn" data-channel="market">🛒 Рынок</button>
            <button class="channel-btn" data-channel="events">🎉 События</button>
            <button class="channel-btn" data-channel="help">🆘 Помощь</button>
            <button class="channel-btn" data-channel="offtopic">💬 Оффтоп</button>
            <button class="channel-btn" data-channel="admin">⚡ Администрация</button>
        </div>

        <!-- ===== СООБЩЕНИЯ ===== -->
        <div class="chat-messages" id="chatMessages">
            <div class="system-message">
                <span class="city-tag">РОБЛОКСИЯ</span> — <strong>Общий чат города</strong>
            </div>
            <div class="system-message">🏙️ Добро пожаловать в Роблоксия</div>
        </div>

        <!-- ===== СТАТУС ПЕЧАТАЕТ ===== -->
        <div class="typing-status" id="typingStatus"></div>

        <!-- ===== ПАНЕЛЬ ИНСТРУМЕНТОВ ===== -->
        <div class="toolbar">
            <button class="toolbar-btn" onclick="document.getElementById('fileInput').click()">📷 Фото</button>
            <button class="toolbar-btn" onclick="toggleRecording()">🎤 Голос</button>
            <button class="toolbar-btn" onclick="toggleEmojiPicker()">😊 Эмодзи</button>
            <button class="toolbar-btn" onclick="createPoll()">📊 Опрос</button>
            <button class="toolbar-btn" onclick="sendLocation()">📍 Гео</button>
            <button class="toolbar-btn" onclick="sendContact()">📇 Контакт</button>
            <button class="toolbar-btn" onclick="toggleTheme()">🌙 Тема</button>
            <button class="toolbar-btn" onclick="clearChat()">🗑 Очистить</button>
        </div>

        <!-- ===== ЭМОДЗИ ПИКЕР ===== -->
        <div class="emoji-picker" id="emojiPicker">
            <span onclick="addEmoji('😊')">😊</span>
            <span onclick="addEmoji('😂')">😂</span>
            <span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('👍')">👍</span>
            <span onclick="addEmoji('👎')">👎</span>
            <span onclick="addEmoji('🙏')">🙏</span>
            <span onclick="addEmoji('💪')">💪</span>
            <span onclick="addEmoji('🎉')">🎉</span>
            <span onclick="addEmoji('😎')">😎</span>
            <span onclick="addEmoji('🤔')">🤔</span>
            <span onclick="addEmoji('🤦')">🤦</span>
            <span onclick="addEmoji('👀')">👀</span>
            <span onclick="addEmoji('💀')">💀</span>
            <span onclick="addEmoji('✨')">✨</span>
            <span onclick="addEmoji('🌟')">🌟</span>
            <span onclick="addEmoji('🌙')">🌙</span>
            <span onclick="addEmoji('☀️')">☀️</span>
            <span onclick="addEmoji('⚡')">⚡</span>
            <span onclick="addEmoji('💡')">💡</span>
            <span onclick="addEmoji('🔑')">🔑</span>
            <span onclick="addEmoji('🔒')">🔒</span>
            <span onclick="addEmoji('📱')">📱</span>
            <span onclick="addEmoji('💻')">💻</span>
            <span onclick="addEmoji('🏠')">🏠</span>
            <span onclick="addEmoji('🏢')">🏢</span>
            <span onclick="addEmoji('🏪')">🏪</span>
            <span onclick="addEmoji('🏫')">🏫</span>
            <span onclick="addEmoji('🚗')">🚗</span>
            <span onclick="addEmoji('🚕')">🚕</span>
            <span onclick="addEmoji('🚌')">🚌</span>
            <span onclick="addEmoji('🚀')">🚀</span>
            <span onclick="addEmoji('🌈')">🌈</span>
            <span onclick="addEmoji('🌊')">🌊</span>
            <span onclick="addEmoji('🎮')">🎮</span>
            <span onclick="addEmoji('🕹️')">🕹️</span>
            <span onclick="addEmoji('👾')">👾</span>
            <span onclick="addEmoji('🤖')">🤖</span>
        </div>

        <!-- ===== ФУТЕР ===== -->
        <div class="chat-footer">
            <input type="text" class="footer-input" id="messageInput" placeholder="Написать в Роблоксия...">
            <button class="btn btn-primary" id="sendBtn">Отправить</button>
            <input type="file" class="hidden-input" id="fileInput" accept="image/*" capture="environment">
            <button class="btn btn-record" id="audioBtn">🎤</button>
            <button class="btn btn-icon" id="replyBtn" style="display:none;">↩</button>
        </div>

    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ============================================================

        //  Firebase Realtime Database + Storage
        // ============================================================

        // ----- ИМПОРТ FIREBASE -----
        (async function() {
            const { initializeApp } = await import(
                "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
            );
            const {
                getDatabase,
                ref,
                push,
                onChildAdded,
                query,
                limitToLast,
                set,
                onValue,
                remove
            } = await import(
                "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
            );
            const {
                getStorage,
                ref as storageRef,
                uploadBytes,
                getDownloadURL
            } = await import(
                "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
            );

            // ----- КОНФИГ FIREBASE -----
            const firebaseConfig = {
                apiKey: "AIzaSyBGQsFeeyYbNMjT_pvLSrukC_In2mwzoY4",
                authDomain: "chaturoven.firebaseapp.com",
                projectId: "chaturoven",
                storageBucket: "chaturoven.firebasestorage.app",
                messagingSenderId: "756824112892",
                appId: "1:756824112892:web:094cbe71a4d420fa502179"
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const storage = getStorage(app);

            // ----- ПЕРЕМЕННЫЕ -----
            let currentChannel = 'general';
            let currentUserName = '';
            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;
            let lastMessageId = null;
            let replyToMessage = null;
            let isDarkTheme = false;

            // ----- DOM ЭЛЕМЕНТЫ -----
            const registerOverlay = document.getElementById('registerOverlay');
            const registerInput = document.getElementById('registerInput');
            const registerBtn = document.getElementById('registerBtn');
            const registerError = document.getElementById('registerError');
            const currentUserDisplay = document.getElementById('currentUser');
            const messagesContainer = document.getElementById('chatMessages');
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            const fileInput = document.getElementById('fileInput');
            const audioBtn = document.getElementById('audioBtn');
            const onlineCount = document.getElementById('onlineCount');
            const typingStatus = document.getElementById('typingStatus');
            const emojiPicker = document.getElementById('emojiPicker');
            const replyBtn = document.getElementById('replyBtn');
            const currentChannelDisplay = document.getElementById('currentChannel');

            const channelNames = {
                'general': '🏠 Общий',
                'news': '📰 Новости',
                'services': '🔧 Услуги',
                'market': '🛒 Рынок',
                'events': '🎉 События',
                'help': '🆘 Помощь',
                'offtopic': '💬 Оффтоп',
                'admin': '⚡ Администрация'
            };

            // ----- ФУНКЦИИ -----

            // Загрузка сохранённого пользователя
            function loadSavedUser() {
                const saved = localStorage.getItem('rob_loxia_username');
                if (saved && saved.trim()) return saved.trim();
                return null;
            }

            // Вход
            function loginUser(name) {
                currentUserName = name;
                localStorage.setItem('rob_loxia_username', name);
                localStorage.setItem('rob_loxia_user_id', Date.now().toString());
                currentUserDisplay.textContent = name;
                registerOverlay.classList.add('hidden');
                input.focus();
                addSystemMessage(name + ' вошёл в Роблоксия');
                updateOnlineStatus(true);
                loadMessages();
                updateOnlineCount();
                watchTyping();
            }

            function updateOnlineStatus(online) {
                const userId = localStorage.getItem('rob_loxia_user_id') || 'guest';
                set(ref(db, 'users/' + userId), {
                    name: currentUserName || 'Гость',
                    online: online,
                    lastSeen: Date.now(),
                    city: 'Роблоксия'
                });
            }

            function updateOnlineCount() {
                const usersRef = ref(db, 'users');
                onValue(usersRef, (snapshot) => {
                    let count = 0;
                    snapshot.forEach((child) => {
                        const data = child.val();
                        if (data.online && (Date.now() - data.lastSeen < 60000)) {
                            count++;
                        }
                    });
                    onlineCount.textContent = count + ' онлайн';
                });
            }

            function watchTyping() {
                const typingRef = ref(db, 'typing');
                onValue(typingRef, (snapshot) => {
                    let typingUsers = [];
                    snapshot.forEach((child) => {
                        const data = child.val();
                        if (data.typing && (Date.now() - data.timestamp < 3000) && data.name !==
                            currentUserName) {
                            typingUsers.push(data.name);
                        }
                    });
                    if (typingUsers.length > 0) {
                        typingStatus.textContent = typingUsers.join(', ') + ' печатает...';
                        typingStatus.style.display = 'block';
                    } else {
                        typingStatus.style.display = 'none';
                    }
                });
            }

            function setTypingStatus(typing) {
                const userId = localStorage.getItem('rob_loxia_user_id') || 'guest';
                set(ref(db, 'typing/' + userId), {
                    name: currentUserName || 'Гость',
                    typing: typing,
                    timestamp: Date.now()
                });
            }

            function loadMessages() {
                const messagesRef = ref(db, 'messages/' + currentChannel);
                const recentQuery = query(messagesRef, limitToLast(100));
                onChildAdded(recentQuery, (snapshot) => {
                    const data = snapshot.val();
                    if (data.id !== lastMessageId) {
                        addMessageToDOM(data);
                        lastMessageId = data.id;
                        scrollToBottom();
                        playNotificationSound();
                    }
                });
            }

            function sendMessage() {
                const text = input.value.trim();
                if (!text && !replyToMessage) return;

                const userId = localStorage.getItem('rob_loxia_user_id') || 'guest';
                const messagesRef = ref(db, 'messages/' + currentChannel);
                const messageData = {
                    id: Date.now().toString(),
                    author: currentUserName || 'Гость',
                    text: text || '[вложение]',
                    timestamp: Date.now(),
                    userId: userId,
                    replyTo: replyToMessage || null,
                    channel: currentChannel
                };

                push(messagesRef, messageData);
                input.value = '';
                replyToMessage = null;
                replyBtn.style.display = 'none';
                setTypingStatus(false);
                input.focus();
            }

            function addMessageToDOM(data) {
                const msgDiv = document.createElement('div');
                const isOutgoing = data.userId === localStorage.getItem('rob_loxia_user_id');
                msgDiv.className = `message ${isOutgoing ? 'message-out' : 'message-in'}`;
                msgDiv.dataset.id = data.id;

                const time = new Date(data.timestamp);
                const timeStr = time.getHours().toString().padStart(2, '0') + ':' +
                    time.getMinutes().toString().padStart(2, '0');

                let content = '';
                if (data.image) {
                    content =
                        `<img src="${data.image}" class="msg-image" alt="фото" onclick="window.open('${data.image}','_blank')" />`;
                } else if (data.audio) {
